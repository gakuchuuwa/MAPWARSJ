<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPWAR 原型</title>
    <!-- Leaflet CSS imported via main.ts (local npm package) — avoids CDN block on cold start -->
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="./src/ui/stitch_bottom_hud.css">
    <link rel="stylesheet" href="./src/ui/city-marker.css">
</head>

<body>
    <script type="module" src="/src/debug/perfEarly.ts"></script>
    <div id="map"></div>

    <!-- SVG Filters for Map Effects -->
    <svg style="position: absolute; height: 0; width: 0; pointer-events: none;">
        <defs>
            <filter id="rough-edge">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
            </filter>
        </defs>
    </svg>
    <div id="notification-area"></div>

    <!-- 左下 HUD：Stitch 833dbd17 -->
    <div id="game-time-hud" style="display: none;">
        <div class="hud-stack">
        <div class="hud-map-panel">
            <span class="hud-corner hud-corner-tl" aria-hidden="true"></span>
            <span class="hud-corner hud-corner-tr" aria-hidden="true"></span>
            <span class="hud-corner hud-corner-bl" aria-hidden="true"></span>
            <span class="hud-corner hud-corner-br" aria-hidden="true"></span>
            <div class="hud-map-body">
                <div class="hud-map-rows">
                    <div class="hud-map-row">
                        <span class="label">坐标</span>
                        <span class="value" id="coords">0, 0</span>
                    </div>
                    <div class="hud-map-row">
                        <span class="label">六边形</span>
                        <span class="value" id="hex-coords">0, 0</span>
                    </div>
                    <div class="hud-map-row hud-map-row--terrain">
                        <span class="label">地形</span>
                        <span class="value" id="terrain-type">-</span>
                    </div>
                </div>
                <div class="hud-zoom" role="group" aria-label="地图缩放">
                    <button id="map-zoom-in" type="button" class="hud-zoom-btn" title="放大">+</button>
                    <span id="map-zoom-level" class="hud-zoom-level" aria-live="polite">9</span>
                    <button id="map-zoom-out" type="button" class="hud-zoom-btn" title="缩小">−</button>
                </div>
            </div>
        </div>
        <div id="game-date-display" class="hud-date-bar" aria-live="polite">
            <span class="hud-date-cap hud-date-cap--l" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4 3-7 7-7 11a7 7 0 0 0 14 0c0-4-3-8-7-11z"/></svg></span>
            <div class="hud-date-body">
                <div class="hud-date-inner">
                    <span id="game-year-display">前246年</span>
                    <span id="game-season-display">春</span>
                </div>
            </div>
            <span class="hud-date-cap hud-date-cap--r" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4 3-7 7-7 11a7 7 0 0 0 14 0c0-4-3-8-7-11z"/></svg></span>
        </div>
        <div class="hud-controls">
            <button id="run-event-btn" type="button" class="game-time-btn">播放</button>
            <button id="speed2-btn" type="button" class="game-time-btn" title="2倍速">2×</button>
            <button id="speed-btn" type="button" class="game-time-btn" title="5倍速">5×</button>
            <button id="perf-toggle-btn" type="button" class="game-time-btn" title="性能监控 (F3)">性能</button>
        </div>
        </div>
    </div>

    <!-- 右侧：大乱斗军情面板（展开/收起列表） -->
    <div id="event-display" class="event-panel">
        <div class="event-header">
            <span>军情</span>
            <button id="toggle-event-list-btn" type="button" title="展开军情">▼</button>
        </div>
        <div id="event-content"></div>
    </div>

    <div id="hud" class="hud">
        <!-- 玩家信息（坐标/纪年/控制已并入左下 #game-time-hud，勿再建第二套 info-panel） -->
        <div class="player-info info-panel" style="display: none;">
            <div class="player-title">👤 玩家信息</div>
            <div class="player-stats">
                <div class="stat-row">
                    <span class="stat-label">官职:</span>
                    <span class="stat-value" id="player-rank">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">兵力:</span>
                    <span class="stat-value" id="player-troops">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">功勋:</span>
                    <span class="stat-value" id="player-merit">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">势力:</span>
                    <span class="stat-value" id="player-faction">未选择</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">无敌:</span>
                    <button id="toggle-invincible"
                        style="background: none; border: 1px solid #666; cursor: pointer; color: #aaa; padding: 0 4px; border-radius: 4px; font-size: 0.9em;">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
