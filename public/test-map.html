<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图测试</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; background: #3b82f6; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        console.log('🗺️ 初始化测试地图...');

        const map = L.map('map', {
            center: [34.26, 108.94],
            zoom: 9,
            minZoom: 9,
            maxZoom: 9,
            zoomControl: true,
            attributionControl: false
        });

        console.log('✅ Leaflet地图对象创建成功');

        const tileLayer = L.tileLayer(
            '/9dixingtu/Google%20Terrain%20Maps%20without%20labels%20%20roads%20and%20POI%20%20512px/{x}/{y}.jpg',
            {
                minZoom: 9,
                maxZoom: 9,
                tileSize: 512,
                zoomOffset: -1,
                noWrap: true,
                bounds: [[29.0, 103.0], [39.0, 115.0]],
                errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg=='
            }
        );

        tileLayer.addTo(map);
        console.log('✅ 瓦片图层已添加');

        let tilesLoaded = 0;
        let tilesError = 0;

        tileLayer.on('tileload', (e) => {
            tilesLoaded++;
            console.log(`✅ 瓦片加载成功 (#${tilesLoaded}):`, e.tile.src);
        });

        tileLayer.on('tileerror', (e) => {
            if (!e.tile.src.startsWith('data:image')) {
                tilesError++;
                console.error(`❌ 瓦片加载失败 (#${tilesError}):`, e.tile.src);
            }
        });

        setTimeout(() => {
            map.invalidateSize();
            console.log(`📊 统计: ${tilesLoaded}个瓦片加载成功, ${tilesError}个失败`);
        }, 1000);

        map.on('click', (e) => {
            console.log('点击:', e.latlng);
        });
    </script>
</body>
</html>
