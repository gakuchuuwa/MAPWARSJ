<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>简单测试</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        console.log('Step 1: Creating map');
        const map = L.map('map').setView([34.26, 108.94], 9);
        console.log('Step 2: Map created', map);

        console.log('Step 3: Adding tile layer with OSM');
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);
        console.log('Step 4: Tile layer added');
    </script>
</body>
</html>
