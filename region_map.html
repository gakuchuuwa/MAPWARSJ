<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>MAPWARSJ 14区划分</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;font-family:sans-serif}
#map{width:100vw;height:100vh}
.legend{background:rgba(0,0,0,0.8);color:#fff;padding:10px;border-radius:4px;font-size:12px}
.legend-item{display:flex;align-items:center;margin:2px 0}
.legend-color{width:14px;height:14px;margin-right:6px;border-radius:2px;opacity:0.5}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const R=[
{id:'CENTRAL',n:'中原',c:'#e74c3c',p:[[33.07,107.02],[32.45,119.4],[37.51,122.12],[36.59,109.48],[34.58,105.73]],bc:['汉中','扬州','威海卫','肤施','天水']},
{id:'NORTH',n:'北方',c:'#3498db',p:[[36.59,109.48],[40.82,111.68],[41.27,123.17],[37.51,122.12]],bc:['肤施','归化','襄平','威海卫']},
{id:'NORTHEAST',n:'东北',c:'#2ecc71',p:[[41.27,123.17],[41.13,126.19],[41.8,140.1],[52.41,142.39],[50.23,119.54]],bc:['襄平','国内城','胜山馆','囊哈儿卫','额尔古纳']},
{id:'KOREA',n:'朝鲜',c:'#9b59b6',p:[[41.27,123.17],[37.51,122.12],[34.2,129.29],[41.8,140.1],[41.13,126.19]],bc:['襄平','威海卫','金石城','胜山馆','国内城']},
{id:'JAPAN',n:'日本',c:'#e67e22',p:[[41.8,140.1],[34.2,129.29],[32.45,119.4],[28.45,129.67],[35.68,139.76],[38.99,141.12],[40.5,141.46]],bc:['胜山馆','金石城','扬州','赤木名城','江户','柳之御所','根城']},
{id:'STEPPE',n:'草原',c:'#1abc9c',p:[[50.23,119.54],[53.7,91.45],[43.3,68.27],[42.85,89.53],[40.52,89.92],[40.82,111.68],[41.27,123.17]],bc:['额尔古纳','剑河','亚西','高昌','楼兰','归化','襄平']},
{id:'HEXI',n:'河西',c:'#f39c12',p:[[40.82,111.68],[42.83,93.51],[40.52,89.92],[37.93,102.64],[34.58,105.73]],bc:['归化','哈密卫','扜泥城','姑臧','天水']},
{id:'BASHU',n:'川蜀',c:'#2c3e50',p:[[34.58,105.73],[30.05,101.96],[26.22,111.63],[33.07,107.02]],bc:['天水','打箭炉','永州','汉中']},
{id:'JIANGNAN',n:'南方',c:'#e91e63',p:[[26.22,111.63],[29.87,121.54],[28.45,129.67],[32.45,119.4]],bc:['永州','庆元','赤木名城','扬州']},
{id:'LINGNAN',n:'岭南',c:'#00bcd4',p:[[28.45,129.67],[13.77,109.23],[30.05,101.96],[26.22,111.63]],bc:['赤木名城','占城港','打箭炉','永州']},
{id:'DIANQIAN',n:'滇缅',c:'#8bc34a',p:[[30.05,101.96],[21.17,94.86],[18.83,95.25],[14.35,100.58],[13.41,103.87],[13.77,109.23]],bc:['打箭炉','蒲甘','室利差罗','阿瑜陀耶','吴哥','占城港']},
{id:'TIBET',n:'青藏',c:'#795548',p:[[21.17,94.86],[37.63,62.23],[37.77,75.23],[35.45,81.1],[40.52,89.92]],bc:['蒲甘','梅尔夫','喝槃陀城','克里雅山口','楼兰']},
{id:'CENTRAL_ASIA',n:'中亚',c:'#607d8b',p:[[43.3,68.27],[42.24,59.63],[37.63,62.23]],bc:['亚西','玉龙杰赤','梅尔夫']},
{id:'WESTERN',n:'西域',c:'#ff5722',p:[[40.52,89.92],[37.77,75.23],[43.3,68.27],[42.85,89.53]],bc:['楼兰','喝槃陀城','亚西','高昌']}
];
const map=L.map('map').setView([42,95],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:10}).addTo(map);
R.forEach(r=>{
const ll=r.p.map(p=>[p[0],p[1]]);
L.polygon(ll,{color:r.c,weight:2,fillColor:r.c,fillOpacity:0.12}).addTo(map);
const cx=ll.reduce((a,b)=>[a[0]+b[0]/ll.length,a[1]+b[1]/ll.length],[0,0]);
L.marker(cx,{icon:L.divIcon({html:'<div style="background:rgba(0,0,0,0.7);color:#fff;padding:2px 6px;border-radius:3px;font-size:12px;font-weight:bold">'+r.n+'</div>',iconSize:[0,0]})}).addTo(map);
r.p.forEach((p,i)=>{
L.circleMarker([p[0],p[1]],{radius:5,color:r.c,weight:2,fillColor:'#fff',fillOpacity:1}).addTo(map).bindTooltip(r.bc[i]||'',{permanent:false});
});
});
const leg=L.control({position:'bottomright'});
leg.onAdd=function(){const d=L.DomUtil.create('div','legend');d.innerHTML='<b>14 区划分</b><br>'+R.map(r=>'<div class="legend-item"><div class="legend-color" style="background:'+r.c+'"></div>'+r.n+'</div>').join('');return d;};
leg.addTo(map);
</script>
</body>
</html>
